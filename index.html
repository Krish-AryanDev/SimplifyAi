<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Athena | Intelligent Concept Simplifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap");

      :root {
        --athena-blue: #a0c4ff; /* Pastel Blue */
        --athena-bg: #f0f7ff;
        --athena-surface: #ffffff;
        --athena-text: #2d3436;
        --transition-speed: 0.5s;
      }

      /* Modern Pastel Mode Themes */
      .theme-child {
        --athena-blue: #ffadad; /* Pastel Coral/Red */
        --athena-bg: #fff5f5;
      }
      .theme-teen {
        --athena-blue: #a0c4ff; /* Pastel Sky Blue */
        --athena-bg: #f0f7ff;
      }
      .theme-adult {
        --athena-blue: #bdb2ff; /* Pastel Lavender */
        --athena-bg: #f8f7ff;
      }
      .dark-mode {
        --athena-bg: #1a1a2e;
        --athena-surface: #16213e;
        --athena-text: #eaeaea;
        --athena-blue: #90a4ff;
      }

      /* Remove glowing/shadow effects in Dark Mode */
      .dark-mode .shadow-xl,
      .dark-mode .shadow-2xl,
      .dark-mode .shadow-indigo-100\/50 {
        box-shadow: none !important;
        border-color: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--athena-bg);
        color: var(--athena-text);
        min-height: 100vh;
        transition:
          background-color var(--transition-speed),
          color var(--transition-speed);
        margin: 0;
        display: flex;
      }

      .google-sans {
        font-family: "Google Sans", sans-serif;
      }

      /* Sidebar Styles */
      #sidebar {
        position: fixed;
        left: -280px;
        top: 0;
        bottom: 0;
        width: 280px;
        background: var(--athena-surface);
        border-right: 1px solid rgba(0, 0, 0, 0.05);
        z-index: 100;
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
      }

      #sidebar.open {
        left: 0;
        box-shadow: 20px 0 50px rgba(0, 0, 0, 0.05);
      }

      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(2px);
        z-index: 90;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }

      .sidebar-overlay.visible {
        opacity: 1;
        visibility: visible;
      }

      /* Sidebar Scrollable History */
      #sidebarHistory {
        flex-grow: 1;
        overflow-y: auto;
        margin: 1rem 0;
      }

      .history-item {
        padding: 0.75rem 1rem;
        border-radius: 12px;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.2s;
        margin-bottom: 0.25rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #636e72;
      }

      .history-item:hover {
        background: rgba(160, 196, 255, 0.1);
        color: var(--athena-blue);
      }

      /* Splash Screen */
      #splash-screen {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition:
          opacity 0.8s ease-out,
          visibility 0.8s;
      }

      .splash-logo {
        width: 320px;
        max-width: 85%;
        opacity: 0;
        transform: scale(0.98);
        transition: opacity 0.6s ease-in;
      }

      .splash-logo.loaded {
        opacity: 1;
        transform: scale(1);
      }

      /* Segmented Control - Pastel Style */
      .segmented-control {
        background: rgba(0, 0, 0, 0.05);
        padding: 4px;
        border-radius: 20px;
        display: flex;
        position: relative;
        backdrop-filter: blur(10px);
      }

      .segment-btn {
        flex: 1;
        padding: 10px 20px;
        font-size: 0.875rem;
        font-weight: 600;
        border-radius: 16px;
        z-index: 1;
        transition: color 0.3s;
        color: #636e72;
      }

      .segment-btn.active {
        color: white;
      }

      .slider {
        position: absolute;
        height: calc(100% - 8px);
        width: calc(33.33% - 4px);
        background: var(--athena-blue);
        border-radius: 16px;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      }

      /* Jargon Buster Tooltips */
      .jargon {
        border-bottom: 2px dashed var(--athena-blue);
        cursor: help;
        position: relative;
      }

      .jargon:hover::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 130%;
        left: 50%;
        transform: translateX(-50%);
        background: #2d3436;
        color: white;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 0.8rem;
        width: 220px;
        z-index: 50;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        line-height: 1.4;
      }

      /* Prerequisite Capsules */
      .capsule {
        background: var(--athena-surface);
        border: 1px solid rgba(0, 0, 0, 0.05);
        padding: 8px 18px;
        border-radius: 24px;
        font-size: 0.85rem;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
      }

      .capsule:hover {
        border-color: var(--athena-blue);
        color: var(--athena-blue);
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
      }

      .hidden-el {
        display: none !important;
      }

      .chat-bubble {
        max-width: 85%;
        animation: slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Typography Adjustments */
      .hero-subtitle {
        font-size: clamp(1.5rem, 5vw, 2.25rem);
        font-weight: 500;
        color: var(--athena-text);
        letter-spacing: -0.03em;
        line-height: 1.2;
      }

      /* Modal Styles */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }

      .modal.open {
        opacity: 1;
        visibility: visible;
      }

      .modal-content {
        background: white;
        padding: 2.5rem;
        border-radius: 32px;
        max-width: 500px;
        width: 90%;
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }

      .modal.open .modal-content {
        transform: scale(1);
      }

      .dark-mode #sidebar,
      .dark-mode .modal-content {
        background: var(--athena-surface);
        color: var(--athena-text);
      }
    </style>
  </head>
  <body class="theme-teen">

        <img

            ></path>

    </aside>

    <!-- Modals -->
    <div id="profileModal" class="modal" onclick="closeModal('profileModal')">
      <div class="modal-content" onclick="event.stopPropagation()">
        <h3 class="text-2xl font-bold google-sans mb-4">Profile</h3>
        <div class="flex items-center gap-4 mb-6">
          <div
            class="w-16 h-16 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 font-bold text-2xl"

            A
          </div>
          <div>

    <div id="settingsModal" class="modal" onclick="closeModal('settingsModal')">

    <div id="main-content" class="flex-grow">
      <!-- Sticky Header -->
      <header
        class="fixed top-0 inset-x-0 z-50 bg-white/50 backdrop-blur-xl border-b border-white/20 px-4 md:px-8 py-5 flex justify-between items-center"

            <svg
              class="w-6 h-6 text-indigo-600"

          >

                stroke-linecap="round"

      <main
        id="main-wrapper"
        class="opacity-0 transition-opacity duration-1000 max-w-5xl mx-auto w-full pt-44 pb-32 px-6 flex flex-col min-h-screen"
      >
        <!-- Hero Section -->
        <div class="text-center mb-16">
          <h2 class="hero-subtitle google-sans mx-auto max-w-3xl">
            Hello! What would you like to simplify today?
          </h2>
        </div>

        <!-- Enhanced Input Control -->
        <div
          class="bg-white/80 backdrop-blur-md border border-white rounded-[40px] p-3 shadow-xl shadow-indigo-100/50 focus-within:shadow-2xl transition-all mb-12"
        >
          <div class="flex flex-col lg:flex-row items-center gap-4">
            <!-- Concept Input -->
            <div class="flex-grow w-full px-8 py-3">
              <input
                type="text"
                id="conceptInput"
                onkeydown="handleEnter(event)"
                placeholder="Enter a concept (e.g. Entropy, CRISPR)..."

              <input

                onkeydown="handleEnter(event)"

                class="w-full bg-transparent border-none outline-none py-1 text-xs font-medium text-indigo-300"

            <!-- Segmented Control for Age -->
            <div class="w-full lg:w-auto px-4">
              <div class="segmented-control">
                <div id="slider" class="slider"></div>
                <button
                  class="segment-btn relative"
                  onclick="setMode('child', 0)"
                >
                  Child
                </button>
                <button
                  class="segment-btn relative active"
                  id="defaultMode"
                  onclick="setMode('teen', 1)"
                >
                  Teen
                </button>
                <button
                  class="segment-btn relative"
                  onclick="setMode('adult', 2)"
                >
                  Expert
                </button>
              </div>

            <button
              id="simplifyBtn"
              onclick="generateResponse(this)"
              class="w-full lg:w-auto bg-indigo-500 text-white rounded-[32px] px-10 py-5 font-bold hover:bg-indigo-600 transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-indigo-200"
            >
              <span>Explain</span>
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"

                  d="M13 5l7 7-7 7M5 5l7 7-7 7"

        <!-- Loading State -->

          id="loadingState"
          class="hidden-el space-y-6 animate-pulse mt-12 px-12"
        >
          <div class="h-6 bg-gray-200 rounded-full w-2/3"></div>
          <div class="h-4 bg-gray-200 rounded-full w-1/2"></div>
          <div class="h-48 bg-white/50 rounded-[40px] w-full"></div>
        </div>
      </main>

    <!-- Template for History Item -->
    <template id="historyTemplate">
      <div class="chat-item space-y-6">

          <div
            class="bg-indigo-50 text-indigo-600 px-8 py-4 rounded-[28px] chat-bubble border border-indigo-100"
          >
            <p class="font-bold text-lg prompt-text"></p>
          </div>
        </div>

        <div
          class="bg-white border border-gray-100 p-10 rounded-[48px] shadow-sm space-y-8"
        >
          <div class="flex flex-wrap gap-3 prerequisite-container">
            <!-- Capsules here -->
          </div>

          <div
            class="output-content space-y-6 text-gray-700 text-xl leading-relaxed font-light"
          >
            <!-- Simplified text here -->
          </div>

          <!-- Video Embed -->
          <div
            class="video-container rounded-[32px] overflow-hidden bg-gray-900 aspect-video hidden-el ring-8 ring-gray-50"
          >
            <!-- YouTube Iframe -->
          </div>

          <div class="border-t border-gray-50 pt-6">
            <div class="flex gap-6">
              <button
                onclick="copyToClipboard(this)"
                class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-indigo-600 transition-colors"
              >
                Copy Link
              </button>
            </div>
          </div>
        </div>
      </div>

    <script>
      const GROQ_API_KEY =
        "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";
      const YT_API_KEY = "AIzaSyDU8kLLkhMZONkwDOBbj3r9_mWIfLE4eXM";
      const GROQ_CHAT_URL = "https://api.groq.com/openai/v1/chat/completions";
      /** Groq model (OpenAI-compatible chat completions) */
      const GROQ_MODEL = "llama-3.3-70b-versatile";

      let currentMode = "teen";
      let historyStack = [""];
      let historyIndex = 0;
      let sidebarTopics = [];
      const chatHistory = [];

      const difficultyLabel = {
        child: "Child",
        teen: "Beginner",
        adult: "Expert",
      };
      const toneLabel = {
        child: "Playful and simple",
        teen: "Clear and textbook-friendly",
        adult: "Rigorous and technical",
      };

      window.addEventListener("load", () => {
        setTimeout(() => {
          const splash = document.getElementById("splash-screen");
          splash.style.opacity = "0";
          document.getElementById("main-wrapper").style.opacity = "1";
          setTimeout(() => (splash.style.visibility = "hidden"), 800);
        }, 1600);
      });

      function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("open");
        document.getElementById("sidebarOverlay").classList.toggle("visible");
      }

      function updateSidebarHistory(topic) {
        if (!sidebarTopics.includes(topic)) {
          sidebarTopics.unshift(topic);
          renderSidebar();
        }
      }

      function renderSidebar() {
        const historyContainer = document.getElementById("sidebarHistory");
        if (sidebarTopics.length === 0) {
          historyContainer.innerHTML =
            '<div class="text-xs text-gray-400 italic px-4">No recent searches...</div>';
          return;
        }
        historyContainer.innerHTML = sidebarTopics
          .map(
            (topic) =>
              `<div class="history-item" onclick="loadHistoryItem('${topic.replaceAll("'", "\\'")}')">${topic}</div>`,
          )
          .join("");
      }

      function loadHistoryItem(topic) {
        document.getElementById("conceptInput").value = topic;
        generateResponse();
        if (window.innerWidth < 1024) toggleSidebar();
      }

      function openProfile() {
        document.getElementById("profileModal").classList.add("open");
      }
      function openSettings() {
        document.getElementById("settingsModal").classList.add("open");
      }
      function closeModal(id) {
        document.getElementById(id).classList.remove("open");
      }

      function setMode(mode, index) {
        currentMode = mode;
        document.getElementById("slider").style.transform =
          `translateX(${index * 100}%)`;
        const darkOn = document.body.classList.contains("dark-mode");
        document.body.className = `theme-${mode}`;
        if (darkOn) document.body.classList.add("dark-mode");
        document
          .querySelectorAll(".segment-btn")
          .forEach((btn, i) => btn.classList.toggle("active", i === index));
      }

      function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
      }

      function newChat() {
        document.getElementById("chatHistory").innerHTML = "";
        document.getElementById("conceptInput").value = "";
        saveHistoryState();
        chatHistory.length = 0;
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function handleEnter(e) {
        if (e.key === "Enter") {
          e.preventDefault();
          generateResponse(e.target);
        }
      }

      function copyToClipboard(btn) {
        const text = btn
          .closest(".chat-item")
          .querySelector(".output-content").innerText;
        navigator.clipboard.writeText(text).then(() => {
          const original = btn.innerText;
          btn.innerText = "COPIED!";
          btn.classList.add("text-indigo-600");
          setTimeout(() => {
            btn.innerText = original;
            btn.classList.remove("text-indigo-600");
          }, 1800);
        });
      }

      function saveHistoryState() {
        const currentHTML = document.getElementById("chatHistory").innerHTML;
        if (currentHTML === historyStack[historyIndex]) return;
        historyStack = historyStack.slice(0, historyIndex + 1);
        historyStack.push(currentHTML);
        historyIndex++;
      }

      function undo() {
        if (historyIndex > 0) {
          historyIndex--;
          document.getElementById("chatHistory").innerHTML =
            historyStack[historyIndex];
        }
      }
      function redo() {
        if (historyIndex < historyStack.length - 1) {
          historyIndex++;
          document.getElementById("chatHistory").innerHTML =
            historyStack[historyIndex];
        }
      }

      window.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "z") {
          if (e.shiftKey) redo();
          else undo();
          e.preventDefault();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "y") {
          redo();
          e.preventDefault();
        }
      });

      function normalizeExplanation(value) {
        if (typeof value === "string") return value;
        if (Array.isArray(value))
          return value
            .map((v) => (typeof v === "string" ? v : JSON.stringify(v)))
            .join("\n");
        if (value && typeof value === "object")
          return Object.values(value)
            .map((v) => String(v))
            .join("\n");
        return String(value ?? "");
      }

      function extractJsonFromText(rawText) {
        const trimmed = String(rawText || "").trim();
        const tryParse = (s) => {
          try {
            return JSON.parse(s);
          } catch (_) {
            return null;
          }
        };
        let parsed = tryParse(trimmed);
        if (parsed) return parsed;
        const fenceMatch = trimmed.match(/```(?:json)?\s*([\s\S]*?)```/i);
        if (fenceMatch?.[1]) {
          parsed = tryParse(fenceMatch[1].trim());
          if (parsed) return parsed;
        }
        const firstBrace = trimmed.indexOf("{");
        const lastBrace = trimmed.lastIndexOf("}");
        if (firstBrace !== -1 && lastBrace > firstBrace) {
          parsed = tryParse(trimmed.slice(firstBrace, lastBrace + 1));
          if (parsed) return parsed;
        }
        throw new Error("No valid JSON found in model response.");
      }

      function formatExplanationToHtml(explanation) {
        const lines = normalizeExplanation(explanation)
          .split("\n")
          .map((x) => x.trim())
          .filter(Boolean);
        if (!lines.length) return "<p>No explanation returned.</p>";
        if (lines.every((line) => /^[-*•]/.test(line))) {
          return `<ul class="list-disc pl-8 space-y-3 font-normal">${lines.map((line) => `<li>${line.replace(/^[-*•]\s*/, "")}</li>`).join("")}</ul>`;
        }
        return lines.map((line) => `<p>${line}</p>`).join("");
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      /** Rate-limited APIs often include "retry in X.XXXs" — honor when possible. */
      function parseRetrySecondsFromMessage(msg) {
        const m = String(msg || "").match(/retry in ([\d.]+)\s*s/i);
        if (m) return Math.min(15, parseFloat(m[1], 10) + 0.35);
        return null;
      }

      /** Prevents infinite spinner if the network hangs (no response). */
      async function fetchWithTimeout(url, options, timeoutMs) {
        const controller = new AbortController();
        const t = setTimeout(() => controller.abort(), timeoutMs);
        try {
          return await fetch(url, { ...options, signal: controller.signal });
        } catch (err) {
          if (err && err.name === "AbortError") {
            throw new Error(
              `Request timed out after ${timeoutMs / 1000}s. Check your connection or try again.`,
            );
          }
          throw err;
        } finally {
          clearTimeout(t);
        }
      }

      async function fetchLLMResponse(concept, major) {
        const systemPrompt = `
You are Athena, an educational explainer.
Return a single JSON object only (no markdown fences, no text before or after).

Required shape — use these exact keys as double-quoted JSON keys:
"explanation": string (one JSON string value)
"buildingBlocks": array of exactly 3 strings
"youtubeSearchQuery": string

CRITICAL JSON rules:
- Every string value must start and end with double-quote characters. Never write patterns like "explanation": * item or use bare asterisk bullets as values.
- Put bullet lines INSIDE the "explanation" string: use newline between lines; each line may start with "- " (hyphen space). Do not use * at line starts inside JSON.
- buildingBlocks must be a JSON array like ["a","b","c"], not bullets.

Content rules:
1) Adapt to difficulty "${difficultyLabel[currentMode]}" in tone "${toneLabel[currentMode]}".
2) Tailor analogies to major/profession: "${major || "General"}".
3) Last line of explanation must be a "- Real-Life Application:" bullet.
`.trim();

        const userPrompt = `
User Question: ${concept}
Difficulty: ${difficultyLabel[currentMode]}
User Major/Profession: ${major || "General"}
`.trim();

        const trimmedHistory = chatHistory.slice(-24);
        const groqMessages = [
          { role: "system", content: systemPrompt },
          ...trimmedHistory.map((m) => ({
            role: m.role === "assistant" ? "assistant" : "user",
            content: m.content,
          })),
          { role: "user", content: userPrompt },
        ];

        const basePayload = {
          model: GROQ_MODEL,
          messages: groqMessages,
          temperature: 0.45,
        };
        let useJsonObjectMode = true;

        const maxAttempts = 3;
        const groqTimeoutMs = 90000;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
          const payload = useJsonObjectMode
            ? { ...basePayload, response_format: { type: "json_object" } }
            : basePayload;
          const response = await fetchWithTimeout(
            GROQ_CHAT_URL,
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${GROQ_API_KEY}`,
              },
              body: JSON.stringify(payload),
            },
            groqTimeoutMs,
          );

          if (response.ok) {
            const data = await response.json();
            const rawText = data?.choices?.[0]?.message?.content || "";
            try {
              return extractJsonFromText(rawText);
            } catch (parseErr) {
              throw new Error(
                `Invalid JSON from model: ${parseErr.message}. Try again; the reply must be one JSON object.`,
              );
            }
          }

          let detail = "";
          try {
            const errBody = await response.json();
            detail =
              errBody?.error?.message ||
              JSON.stringify(errBody?.error || errBody);
          } catch (_) {}

          if (
            response.status === 400 &&
            useJsonObjectMode &&
            /response_format|json_object|json mode|does not support|invalid.?value/i.test(
              String(detail),
            )
          ) {
            useJsonObjectMode = false;
            attempt--;
            continue;
          }

          const isRateLimited = response.status === 429;
          const canRetry = isRateLimited && attempt < maxAttempts - 1;

          if (canRetry) {
            const retryAfterHeader = response.headers.get("Retry-After");
            const headerSec = retryAfterHeader
              ? parseFloat(retryAfterHeader, 10)
              : NaN;
            const waitSec = Math.min(
              20,
              (Number.isFinite(headerSec) ? headerSec : null) ??
                parseRetrySecondsFromMessage(detail) ??
                Math.min(12, 2 + attempt * 3),
            );
            await sleep(waitSec * 1000);
            continue;
          }

          const quotaHint = /quota|rate|limit|billing/i.test(detail)
            ? " See https://console.groq.com for usage and limits."
            : "";
          throw new Error(
            detail
              ? `Groq (${GROQ_MODEL}) error ${response.status}: ${detail}.${quotaHint}`
              : `Groq (${GROQ_MODEL}) error: ${response.status}`,
          );
        }
        throw new Error(
          `Groq (${GROQ_MODEL}): request failed after ${maxAttempts} attempts.`,
        );
      }

      let youtubeIframeApiPromise = null;
      function loadYouTubeIframeAPI() {
        if (window.YT && window.YT.Player) return Promise.resolve();
        if (!youtubeIframeApiPromise) {
          youtubeIframeApiPromise = new Promise((resolve) => {
            const prior = window.onYouTubeIframeAPIReady;
            window.onYouTubeIframeAPIReady = function () {
              if (typeof prior === "function") prior();
              resolve();
            };
            if (!document.querySelector('script[src*="iframe_api"]')) {
              const s = document.createElement("script");
              s.src = "https://www.youtube.com/iframe_api";
              document.head.appendChild(s);
            }
          });
        }
        return youtubeIframeApiPromise;
      }

      async function fetchYouTubeVideo(searchQuery, videoContainer) {
        if (!searchQuery) return;
        const endpoint = new URL(
          "https://www.googleapis.com/youtube/v3/search",
        );
        endpoint.searchParams.set("part", "snippet");
        endpoint.searchParams.set("q", searchQuery);
        endpoint.searchParams.set("maxResults", "12");
        endpoint.searchParams.set("type", "video");
        endpoint.searchParams.set("key", YT_API_KEY);

        const response = await fetchWithTimeout(endpoint.toString(), {}, 25000);
        if (!response.ok) return;
        const data = await response.json();
        const candidateIds = (data?.items || [])
          .map((item) => item?.id?.videoId)
          .filter(Boolean);
        if (!candidateIds.length) return;

        const detailsEndpoint = new URL(
          "https://www.googleapis.com/youtube/v3/videos",
        );
        detailsEndpoint.searchParams.set("part", "status");
        detailsEndpoint.searchParams.set("id", candidateIds.join(","));
        detailsEndpoint.searchParams.set("key", YT_API_KEY);

        const detailsResp = await fetchWithTimeout(
          detailsEndpoint.toString(),
          {},
          25000,
        );
        if (!detailsResp.ok) return;
        const detailsData = await detailsResp.json();
        const statusById = Object.fromEntries(
          (detailsData?.items || []).map((v) => [v.id, v]),
        );
        const validIds = candidateIds.filter((id) => {
          const v = statusById[id];
          return (
            v?.status?.embeddable === true &&
            v?.status?.privacyStatus === "public"
          );
        });
        if (!validIds.length) return;

        const hostId = `yt-host-${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
        videoContainer.classList.remove("hidden-el");
        videoContainer.innerHTML = `
          <div class="yt-player-wrapper w-full h-full min-h-0 bg-black">
            <div id="${hostId}"></div>
          </div>
          <div class="px-4 py-3 bg-white text-xs text-gray-500 border-t border-gray-100">
            <a class="yt-watch-link text-indigo-600 hover:text-indigo-700 underline" href="#" target="_blank" rel="noopener noreferrer">Watch on YouTube</a>
          </div>
        `;
        const watchLink = videoContainer.querySelector(".yt-watch-link");
        const setWatchHref = (id) => {
          watchLink.href = `https://www.youtube.com/watch?v=${encodeURIComponent(id)}`;
        };
        const queue = validIds.slice();
        setWatchHref(queue[0]);

        const measurePlayerSize = () => {
          const wrap = videoContainer.querySelector(".yt-player-wrapper");
          const w = Math.floor(
            (wrap && wrap.getBoundingClientRect().width) ||
              videoContainer.getBoundingClientRect().width ||
              640,
          );
          const width = Math.max(280, w);
          const height = Math.round((width * 9) / 16);
          return { width, height };
        };

        try {
          await loadYouTubeIframeAPI();
        } catch (_) {
          const wrap = videoContainer.querySelector(".yt-player-wrapper");
          if (wrap)
            wrap.innerHTML =
              '<p class="p-4 text-sm text-gray-300 text-center">Could not load the YouTube player.</p>';
          return;
        }

        await new Promise((r) =>
          requestAnimationFrame(() => requestAnimationFrame(r)),
        );
        let { width: pW, height: pH } = measurePlayerSize();
        if (pW < 100) {
          pW = 640;
          pH = 360;
        }

        let player;
        const failSlot = videoContainer.querySelector(".yt-player-wrapper");
        const onPlayerError = () => {
          queue.shift();
          if (!queue.length) {
            if (player && typeof player.destroy === "function")
              player.destroy();
            failSlot.innerHTML =
              '<div class="flex items-center justify-center p-6 text-sm text-gray-300 text-center">These results could not be played inside the page (embedding or rights). Use the link below to watch on YouTube.</div>';
            return;
          }
          setWatchHref(queue[0]);
          player.loadVideoById(queue[0]);
          const { width, height } = measurePlayerSize();
          if (width >= 100) player.setSize(width, height);
        };

        player = new YT.Player(hostId, {
          videoId: queue[0],
          width: pW,
          height: pH,
          playerVars: {
            rel: 0,
            modestbranding: 1,
            playsinline: 1,
            origin: window.location.origin,
          },
          events: {
            onReady: (e) => {
              try {
                const { width, height } = measurePlayerSize();
                if (width >= 100) e.target.setSize(width, height);
                const id = e.target.getVideoData().videoId;
                if (id) setWatchHref(id);
              } catch (_) {}
            },
            onError: onPlayerError,
          },
        });

        if (typeof ResizeObserver !== "undefined" && failSlot) {
          const ro = new ResizeObserver(() => {
            if (!player || typeof player.setSize !== "function") return;
            const { width, height } = measurePlayerSize();
            if (width >= 100) player.setSize(width, height);
          });
          ro.observe(failSlot);
        }
      }

      async function generateResponse(triggerEl) {
        const targetInput =
          triggerEl && triggerEl.tagName === "INPUT"
            ? triggerEl
            : document.getElementById("conceptInput");

        const concept = targetInput.value.trim();
        const major = document.getElementById("majorInput").value.trim();
        if (!concept) return;

        updateSidebarHistory(concept);
        document.getElementById("loadingState").classList.remove("hidden-el");

        let clone = null;
        try {
          const template = document.getElementById("historyTemplate");
          clone = template.content.cloneNode(true);
          clone.querySelector(".prompt-text").textContent = concept;
          const outputArea = clone.querySelector(".output-content");
          const prereqs = clone.querySelector(".prerequisite-container");
          const videoContainer = clone.querySelector(".video-container");

          let chatCardInserted = false;
          try {
            const llmJson = await fetchLLMResponse(concept, major);
            const explanation = normalizeExplanation(
              llmJson?.explanation || "No explanation returned.",
            );
            const buildingBlocks = Array.isArray(llmJson?.buildingBlocks)
              ? llmJson.buildingBlocks.slice(0, 3)
              : [];
            const youtubeQuery = String(llmJson?.youtubeSearchQuery || "");

            outputArea.innerHTML = formatExplanationToHtml(explanation);
            prereqs.innerHTML = "";
            buildingBlocks.forEach((term) => {
              const capsule = document.createElement("button");
              capsule.className = "capsule";
              capsule.textContent = term;
              capsule.onclick = () => {
                document.getElementById("conceptInput").value = term;
                generateResponse(document.getElementById("conceptInput"));
              };
              prereqs.appendChild(capsule);
            });

            const historyEl = document.getElementById("chatHistory");
            historyEl.insertBefore(clone, historyEl.firstChild);
            chatCardInserted = true;

            await fetchYouTubeVideo(youtubeQuery, videoContainer);

            chatHistory.push({ role: "user", content: concept });
            chatHistory.push({
              role: "assistant",
              content: JSON.stringify({
                explanation,
                buildingBlocks,
                youtubeSearchQuery: youtubeQuery,
              }),
            });
          } catch (error) {
            outputArea.innerHTML = `<p class="text-red-500">Something went wrong: ${error.message}</p>`;
            if (!chatCardInserted) {
              const historyEl = document.getElementById("chatHistory");
              historyEl.insertBefore(clone, historyEl.firstChild);
            }
          }

          saveHistoryState();
        } catch (fatal) {
          console.error(fatal);
          const box = document.getElementById("chatHistory");
          const err = document.createElement("div");
          err.className =
            "text-red-500 p-4 rounded-2xl bg-white border border-red-100";
          err.textContent = `Could not load: ${fatal.message}`;
          box.insertBefore(err, box.firstChild);
        } finally {
          document.getElementById("loadingState").classList.add("hidden-el");
          targetInput.value = "";
          window.scrollTo({ top: 420, behavior: "smooth" });
        }
      }
    </script>
